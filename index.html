<title>SPOT — Sport on TV</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b0d10'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23d7ff3f'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0b0d10;
    --surface:#13161b;
    --surface-2:#191d24;
    --border:#242a33;
    --text:#e8eaed;
    --muted:#8a919e;
    --faint:#5b6270;
    --accent:#d7ff3f;
    --accent-dim:rgba(215,255,63,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  a{color:inherit}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(11,13,16,.88);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .header-inner{
    max-width:1040px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:baseline;gap:10px;flex-shrink:0}
  .logo{font-size:26px;font-weight:800;letter-spacing:.06em;line-height:1}
  .logo .dot{
    display:inline-block;width:.62em;height:.62em;border-radius:50%;
    background:var(--accent);margin:0 .03em;
    transform:translateY(-.02em);
  }
  .tagline{font-size:10px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase}

  .toggles{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
  .toggle{
    border:1px solid var(--border);background:transparent;color:var(--muted);
    font-size:12.5px;font-weight:600;letter-spacing:.04em;
    padding:6px 14px;border-radius:99px;cursor:pointer;
    transition:all .15s ease;font-family:inherit;
  }
  .toggle.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .toggle:hover{border-color:var(--faint)}

  .view-toggle{
    display:flex;border:1px solid var(--border);border-radius:99px;overflow:hidden;flex-shrink:0;
  }
  .view-btn{
    border:none;background:transparent;color:var(--muted);
    font-size:12.5px;font-weight:600;letter-spacing:.04em;
    padding:6px 14px;cursor:pointer;font-family:inherit;
    transition:all .15s ease;white-space:nowrap;
  }
  .view-btn.on{background:var(--text);color:var(--bg)}

  /* ---------- layout ---------- */
  main{max-width:1040px;margin:0 auto;padding:32px 20px 80px}
  .section-label{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted);margin-bottom:14px;
  }

  /* ---------- top 3 ---------- */
  .top3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:48px}
  .top-card{
    background:linear-gradient(160deg,var(--surface-2),var(--surface));
    border:1px solid var(--border);border-radius:14px;padding:18px;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;gap:8px;
  }
  .top-card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:var(--accent);opacity:.85;
  }
  .top-rank{
    position:absolute;top:12px;right:16px;
    font-size:30px;font-weight:800;color:var(--border);line-height:1;
  }
  .top-meta{font-size:11.5px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
  .top-title{font-size:17px;font-weight:700;line-height:1.3;padding-right:30px}
  .top-blurb{font-size:13px;color:var(--muted);flex-grow:1}
  .top-foot{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px}

  /* ---------- badges & chips ---------- */
  .tv-badge{
    font-size:11px;font-weight:700;letter-spacing:.05em;
    background:var(--surface-2);border:1px solid var(--border);
    color:var(--text);padding:3px 9px;border-radius:5px;white-space:nowrap;
  }
  .sport-tag{
    font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--faint);
  }
  .odds-chip{
    font-size:11.5px;font-variant-numeric:tabular-nums;
    background:transparent;border:1px solid var(--border);
    color:var(--muted);padding:3px 8px;border-radius:5px;white-space:nowrap;
  }
  .odds-chip b{color:var(--text);font-weight:600;margin-left:5px}
  .odds-chip.note{white-space:normal;max-width:100%;line-height:1.4}
  .value-flag{
    font-size:11px;font-weight:700;letter-spacing:.06em;
    color:var(--accent);border:1px solid var(--accent);
    padding:3px 9px;border-radius:5px;white-space:nowrap;
  }

  /* ---------- weeks ---------- */
  .week{margin-bottom:44px}
  .week-head{
    display:flex;align-items:baseline;gap:14px;
    padding-bottom:10px;margin-bottom:18px;
    border-bottom:1px solid var(--border);
  }
  .week-num{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
  .week-range{font-size:20px;font-weight:700}

  .day-group{margin-bottom:20px}
  .day-label{
    font-size:12px;font-weight:700;color:var(--muted);
    letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;
  }

  .event{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px 16px;margin-bottom:8px;
    display:grid;grid-template-columns:64px 1fr;gap:14px;
    transition:border-color .15s ease;
  }
  .event:hover{border-color:var(--faint)}
  .event.big{border-left:3px solid var(--accent)}
  .ev-time{
    font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--text);padding-top:1px;
  }
  .ev-time small{display:block;font-size:10.5px;font-weight:600;color:var(--faint);letter-spacing:.05em}
  .ev-body{min-width:0}
  .ev-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .ev-title{font-size:15.5px;font-weight:700}
  .ev-comp{font-size:12px;color:var(--muted)}
  .ev-tldr{font-size:13px;color:var(--muted);margin-top:4px}
  .ev-foot{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:9px}
  .ev-value{
    margin-top:9px;font-size:12.5px;color:var(--text);
    background:var(--accent-dim);border-left:2px solid var(--accent);
    padding:7px 11px;border-radius:0 7px 7px 0;
  }
  .ev-value b{color:var(--accent);font-weight:700;letter-spacing:.04em}

  .empty-note{
    color:var(--faint);font-size:13px;padding:18px;text-align:center;
    border:1px dashed var(--border);border-radius:12px;
  }

  /* ---------- outright strip ---------- */
  .outright{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    margin:-32px 0 40px;padding:11px 16px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    font-size:12.5px;color:var(--muted);
  }
  .outright .lbl{font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:11px}

  footer{
    max-width:1040px;margin:0 auto;padding:0 20px 48px;
    font-size:12px;color:var(--faint);line-height:1.7;
  }
  footer .upd{color:var(--muted)}

  /* ---------- mobile ---------- */
  @media (max-width:760px){
    .header-inner{padding:12px 16px;gap:12px}
    .toggles{margin-left:0;flex:1;min-width:0;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;
      -webkit-overflow-scrolling:touch;scrollbar-width:none}
    .toggles::-webkit-scrollbar{display:none}
    .logo{font-size:22px}
    main{padding:24px 16px 60px}
    .top3{grid-template-columns:1fr;gap:10px;margin-bottom:36px}
    .week-range{font-size:17px}
    .event{grid-template-columns:1fr;gap:6px;padding:13px 14px}
    .ev-time{display:flex;gap:6px;align-items:baseline;font-size:13px}
    .outright{margin-top:-24px}
  }
</style>
</head>

/* ============================================================
   RENDER
   ============================================================ */
const SPORTS = [
  {key:"football", label:"Football"},
  {key:"rugby", label:"Rugby"},
  {key:"boxing", label:"Boxing"},
  {key:"mma", label:"MMA"}
];

let active = {};
try {
  const saved = JSON.parse(localStorage.getItem("spot-toggles") || "null");
  SPORTS.forEach(s => active[s.key] = saved ? saved[s.key] !== false : true);
} catch(e) { SPORTS.forEach(s => active[s.key] = true); }

function saveToggles(){ try{ localStorage.setItem("spot-toggles", JSON.stringify(active)); }catch(e){} }

let view = "all";
try { view = localStorage.getItem("spot-view") === "week" ? "week" : "all"; } catch(e){}
function setView(v){
  view = v;
  try{ localStorage.setItem("spot-view", v); }catch(e){}
  render();
}

function renderViewToggle(){
  const el = document.getElementById("viewToggle");
  el.innerHTML =
    `<button class="view-btn ${view==="week"?"on":""}" data-view="week">This week</button>` +
    `<button class="view-btn ${view==="all"?"on":""}" data-view="all">4 weeks</button>`;
  el.querySelectorAll(".view-btn").forEach(b => b.onclick = () => setView(b.dataset.view));
}

function findEvent(id){
  for (const w of SPOT_DATA.weeks)
    for (const e of w.events)
      if (e.id === id) return e;
  return null;
}

function oddsHtml(e){
  let h = "";
  if (e.odds) h += e.odds.map(o => `<span class="odds-chip">${o.label}<b>${o.v}</b></span>`).join("");
  else if (e.oddsNote) h += `<span class="odds-chip note">${e.oddsNote}</span>`;
  return h;
}

function renderToggles(){
  const el = document.getElementById("toggles");
  el.innerHTML = SPORTS.map(s =>
    `<button class="toggle ${active[s.key] ? "on" : ""}" data-sport="${s.key}">${s.label}</button>`
  ).join("");
  el.querySelectorAll(".toggle").forEach(btn => {
    btn.onclick = () => {
      active[btn.dataset.sport] = !active[btn.dataset.sport];
      saveToggles();
      render();
    };
  });
}

function renderTop3(){
  const el = document.getElementById("top3");
  const cards = SPOT_DATA.top3
    .map(findEvent)
    .filter(e => e && active[e.sport]);
  if (!cards.length){
    el.innerHTML = `<div class="empty-note" style="grid-column:1/-1">No headline events for the sports you have switched on.</div>`;
    return;
  }
  el.innerHTML = cards.map((e,i) => `
    <div class="top-card">
      <div class="top-rank">${i+1}</div>
      <div class="top-meta">${e.day} · ${e.time} · <span class="sport-tag">${e.sport}</span></div>
      <div class="top-title">${e.title}</div>
      <div class="top-blurb">${e.tldr}</div>
      <div class="top-foot">
        <span class="tv-badge">${e.tv}</span>
        ${e.odds ? e.odds.slice(0,3).map(o => `<span class="odds-chip">${o.label}<b>${o.v}</b></span>`).join("") : ""}
      </div>
    </div>`).join("");
}

function renderOutright(){
  const el = document.getElementById("outright");
  const o = SPOT_DATA.outright;
  if (!o || !active["football"]){ el.style.display = "none"; return; }
  el.style.display = "flex";
  el.innerHTML = `<span class="lbl">${o.label}</span>` +
    o.odds.map(x => `<span class="odds-chip">${x.label}<b>${x.v}</b></span>`).join("");
}

function renderWeeks(){
  const el = document.getElementById("weeks");
  const weeks = view === "week" ? SPOT_DATA.weeks.slice(0,1) : SPOT_DATA.weeks;
  el.innerHTML = weeks.map(w => {
    const evs = w.events.filter(e => active[e.sport])
      .sort((a,b) => (a.dt||"").localeCompare(b.dt||"") || a.time.localeCompare(b.time));
    let body;
    if (!evs.length){
      body = `<div class="empty-note">Nothing on for your selected sports this week.</div>`;
    } else {
      // group by day, preserving order of first appearance
      const days = [];
      const map = {};
      evs.forEach(e => {
        if (!map[e.day]){ map[e.day] = []; days.push(e.day); }
        map[e.day].push(e);
      });
      body = days.map(d => `
        <div class="day-group">
          <div class="day-label">${d}</div>
          ${map[d].map(e => `
            <div class="event ${e.big ? "big" : ""}">
              <div class="ev-time">${e.time}<small>UK</small></div>
              <div class="ev-body">
                <div class="ev-top">
                  <span class="ev-title">${e.title}</span>
                  <span class="ev-comp">${e.comp}</span>
                </div>
                <div class="ev-tldr">${e.tldr}</div>
                <div class="ev-foot">
                  <span class="sport-tag">${e.sport}</span>
                  <span class="tv-badge">${e.tv}</span>
                  ${oddsHtml(e)}
                </div>
                ${e.value ? `<div class="ev-value"><b>VALUE</b>&nbsp; ${e.value}</div>` : ""}
              </div>
            </div>`).join("")}
        </div>`).join("");
    }
    return `
      <section class="week">
        <div class="week-head">
          <span class="week-num">${w.num}</span>
          <span class="week-range">${w.range}</span>
        </div>
        ${body}
      </section>`;
  }).join("");
}

function render(){
  renderToggles();
  renderViewToggle();
  renderTop3();
  renderOutright();
  renderWeeks();
}

document.getElementById("updated").textContent =
  "Last updated " + SPOT_DATA.updated + " · refreshes every Sunday night · showing the next 4 weeks";
render();
</script>
